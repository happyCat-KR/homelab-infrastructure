version: "3.8"

services:
  mysql:
    image: mysql:8.0
    container_name: taskdb
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: 비밀번호
      MYSQL_DATABASE: taskdb
      TZ: Asia/Seoul
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql

volumes:
  mysql-data:
